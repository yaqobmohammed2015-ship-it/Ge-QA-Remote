name: Percy Visual Tests
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  percy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install @percy/cli
      - name: Run Percy
        run: npx percy exec -- echo "Percy is ready"
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
